<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rent a Car</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🚗 Rent a Car</h1>
        <p>Zgjidh makinën tuaj të preferuar</p>
    </header>

    <main>
        <section id="filter-section">
            <h2>Filtro Makinat</h2>
            <div class="filter-buttons">
                <button onclick="filterCars('')">Te Gjitha</button>
                <button onclick="filterCars('available')">Te Disponueshme</button>
                <button onclick="filterCars('rented')">Te Zena</button>
            </div>
        </section>

        <section id="cars-section">
            <h2>Makinat</h2>
            <div id="cars-container"></div>
        </section>

        <section id="add-section">
            <h2>Shto Makinë të Re</h2>
            <div class="form-container">
                <input type="text" id="id" placeholder="ID" />
                <input type="text" id="brand" placeholder="Marka" />
                <input type="text" id="model" placeholder="Modeli" />
                <input type="number" id="year" placeholder="Viti" />
                <input type="number" id="price" placeholder="Çmimi/Ditë" />
                <button onclick="addCar()">Shto Makinën</button>
            </div>
        </section>

        <section id="update-section" style="display:none;">
            <h2>Edito Makinën</h2>
            <div class="form-container">
                <input type="text" id="update-id" placeholder="ID" readonly />
                <input type="text" id="update-brand" placeholder="Marka" />
                <input type="text" id="update-model" placeholder="Modeli" />
                <input type="number" id="update-year" placeholder="Viti" />
                <input type="number" id="update-price" placeholder="Çmimi/Ditë" />
                <button onclick="updateCar()">Ruaj Ndryshimet</button>
                <button onclick="document.getElementById('update-section').style.display='none'">Anulo</button>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
